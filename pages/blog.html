<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Blog · Samarth Bansal</title>
<link href="../css/style.css" rel="stylesheet"/>
<meta content="Personal blog of Samarth Bansal" name="description"/>
</head>
<body>
<div class="container">
<nav>
<a href="/">← Home</a>
</nav>
<h1 class="page-title">Blog</h1>
<div class="view-toggle">
<button class="active" data-view="chronological">All Posts</button>
<button data-view="category">By Category</button>
</div>
<!-- Chronological View -->
<ul class="posts-list" id="chronological-view">
<li class="post-item">
<span class="post-date">Mar 2025</span>
<h2 class="post-title">
<a href="../blog/test-post-for-update.html">
Test Post for Update
</a>
</h2>
</li>
</ul>
<!-- Category View -->
<div class="posts-list" id="category-view" style="display: none;">
<!-- Personal -->
<div class="category-section">
<h3 class="category-title">Personal</h3>
<ul class="posts-list">
<li class="post-item">
<span class="post-date">Mar 2025</span>
<h2 class="post-title">
<a href="../blog/test-post-for-update.html">Test Post for Update</a>
</h2>
</li>
</ul>
</div>
</div>


<script>
        // Toggle between chronological and category views
        document.addEventListener('DOMContentLoaded', function() {
            const viewToggle = document.querySelectorAll('.view-toggle button');
            viewToggle.forEach(button => {
                button.addEventListener('click', function() {
                    // Remove active class from all buttons
                    viewToggle.forEach(btn => btn.classList.remove('active'));
                    
                    // Add active class to clicked button
                    this.classList.add('active');
                    
                    // Toggle view
                    const view = this.getAttribute('data-view');
                    if (view === 'chronological') {
                        document.getElementById('chronological-view').style.display = 'block';
                        document.getElementById('category-view').style.display = 'none';
                    } else {
                        document.getElementById('chronological-view').style.display = 'none';
                        document.getElementById('category-view').style.display = 'block';
                    }
                });
            });
        });
    </script>
</body>
</html>
