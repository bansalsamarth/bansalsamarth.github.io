<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - Samarth Bansal</title>
    <link rel="stylesheet" href="/css/style.css">
    <meta name="description" content="{{ description|default('Personal blog of Samarth Bansal') }}">
</head>
<body>
    <div class="container">
        <nav>
            <a href="/">← Home</a>
            <a href="/pages/blog.html">Blog</a>
        </nav>
        
        {{ content }}
    </div>
    <script>
        // Toggle between chronological and category views
        document.addEventListener('DOMContentLoaded', function() {
            const viewToggle = document.querySelectorAll('.view-toggle button');
            if (viewToggle.length) {
                viewToggle.forEach(button => {
                    button.addEventListener('click', function() {
                        // Remove active class from all buttons
                        viewToggle.forEach(btn => btn.classList.remove('active'));
                        
                        // Add active class to clicked button
                        this.classList.add('active');
                        
                        // Toggle view
                        const view = this.getAttribute('data-view');
                        if (view === 'chronological') {
                            document.getElementById('chronological-view').style.display = 'block';
                            document.getElementById('category-view').style.display = 'none';
                        } else {
                            document.getElementById('chronological-view').style.display = 'none';
                            document.getElementById('category-view').style.display = 'block';
                        }
                    });
                });
            }
        });
    </script>
</body>
</html>
