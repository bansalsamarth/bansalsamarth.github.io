<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>$title$ - Samarth Bansal</title>
    <link rel="stylesheet" href="../css/style.css">
    <meta name="author" content="$author$">
    $if(description-meta)$
    <meta name="description" content="$description-meta$">
    $endif$
    $for(header-includes)$
    $header-includes$
    $endfor$
</head>
<body>
    <div class="container">
        <nav>
            <a href="/">← Home</a>
            <a href="../pages/blog.html">Blog</a>
        </nav>
        
        <article>
            <div class="post-meta">
                $date_published$ $if(category)$in $category$$endif$
            </div>
            
            <h1 class="post-title">$title$</h1>
            
            $if(excerpt)$
            <p><blockquote>$excerpt$</blockquote></p>
            $endif$
            
            <div class="post-content">
                $body$
            </div>
        </article>
    </div>
</body>
</html>
