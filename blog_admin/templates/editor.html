<!-- templates/editor.html -->
<!DOCTYPE html>
<html>
<head>
    <title>Blog Editor</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Monaco Editor -->
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.33.0/min/vs/loader.js"></script>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto px-4 py-8">
        <div class="flex space-x-4">
            <!-- Editor Panel -->
            <div class="w-1/2 space-y-4">
                <div class="bg-white p-4 rounded shadow">
                    <input type="text" id="title" placeholder="Post Title" 
                           class="w-full px-3 py-2 border rounded mb-4">
                    
                    <div class="mb-4">
                        <label class="block text-sm font-medium mb-2">Categories:</label>
                        <div class="flex flex-wrap gap-2">
                            {% for category in categories %}
                            <label class="inline-flex items-center">
                                <input type="checkbox" name="tags[]" value="{{ category }}"
                                       class="form-checkbox">
                                <span class="ml-2">{{ category }}</span>
                            </label>
                            {% endfor %}
                        </div>
                    </div>
                    
                    <div id="editor" style="height: 500px; border: 1px solid #ccc;"></div>
                    
                    <div class="flex space-x-2 mt-4">
                        <button onclick="previewPost()" 
                                class="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600">
                            Preview
                        </button>
                        <button onclick="savePost()" 
                                class="px-4 py-2 bg-green-500 text-white rounded hover:bg-green-600">
                            Save Draft
                        </button>
                        <button onclick="publishPost()" 
                                class="px-4 py-2 bg-red-500 text-white rounded hover:bg-red-600">
                            Publish
                        </button>
                    </div>
                </div>
            </div>
            
            <!-- Preview Panel -->
            <div class="w-1/2">
                <div class="bg-white p-4 rounded shadow">
                    <h2 class="text-xl font-bold mb-4">Preview</h2>
                    <div id="preview" class="prose"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let editor;
        let currentSlug;
        
        // Initialize Monaco Editor
        require.config({ paths: { 'vs': 'https://cdn.jsdelivr.net/npm/monaco-editor@0.33.0/min/vs' }});
        require(['vs/editor/editor.main'], function() {
            editor = monaco.editor.create(document.getElementById('editor'), {
                value: '',
                language: 'markdown',
                theme: 'vs',
                automaticLayout: true
            });
        });

        async function previewPost() {
            const content = editor.getValue();
            const title = document.getElementById('title').value;
            const tags = Array.from(document.querySelectorAll('input[name="tags[]"]:checked'))
                             .map(cb => cb.value);
            
            const formData = new FormData();
            formData.append('content', content);
            formData.append('title', title);
            tags.forEach(tag => formData.append('tags[]', tag));
            
            const response = await fetch('/preview', {
                method: 'POST',
                body: formData
            });
            
            const html = await response.text();
            const previewFrame = document.getElementById('preview');
            previewFrame.innerHTML = html;
        }

        async function savePost() {
            const content = editor.getValue();
            const title = document.getElementById('title').value;
            const tags = Array.from(document.querySelectorAll('input[name="tags[]"]:checked'))
                             .map(cb => cb.value);
            
            if (!title) {
                alert('Please enter a title');
                return;
            }
            
            const formData = new FormData();
            formData.append('content', content);
            formData.append('title', title);
            tags.forEach(tag => formData.append('tags[]', tag));
            
            const response = await fetch('/save', {
                method: 'POST',
                body: formData
            });
            
            const result = await response.json();
            if (result.success) {
                currentSlug = result.slug;
                alert('Draft saved successfully!');
            } else {
                alert('Error saving draft: ' + result.error);
            }
        }

        async function publishPost() {
            if (!currentSlug) {
                alert('Please save the post first');
                return;
            }
            
            const response = await fetch(`/publish/${currentSlug}`, {
                method: 'POST'
            });
            
            const result = await response.json();
            if (result.success) {
                alert('Post published successfully!');
            } else {
                alert('Error publishing post: ' + result.error);
            }
        }
    </script>
</body>
</html>
